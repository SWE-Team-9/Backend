name: Deploy Backend Develop to EC2 via ECR

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 1. CI Phase: Setup, Test, and Compile ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test

      - name: Build NestJS App (Verify it compiles)
        run: npm run build

      # --- 2. AWS Authentication ---
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # --- 3. Build, Smoke Test, and Push Docker Image ---
      - name: Build, test, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: swe-team-9/backend 
          IMAGE_TAG: develop
        run: |
          # Build the Docker image
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          
          # Run the container in the background to test it
          # (Note: Add -e MY_VAR=value here if your app crashes without certain env vars)
          docker run -d --name test-container $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
          # Wait 5 seconds to give the app time to crash if there is an error
          sleep 5
          
          # Check if the container is still running
          if [ "$(docker inspect -f '{{.State.Running}}' test-container)" != "true" ]; then
            echo "🚨 Error: Docker container crashed immediately!"
            echo "--- Container Logs ---"
            docker logs test-container
            exit 1
          fi
          
          echo "✅ Container started successfully."
          
          # Clean up the test container
          docker rm -f test-container
          
          # Push the image to ECR only if the tests and container run passed
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # --- 4. Deployment Phase ---
      - name: Deploy to EC2 and Clean Up
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            
            # Go to your project directory
            cd /home/ec2-user/dev
            
            # Pull the new backend image and restart ONLY the backend container
            docker-compose pull
            docker-compose up -d
            
            # Clean up old Docker images
            docker system prune -a -f
