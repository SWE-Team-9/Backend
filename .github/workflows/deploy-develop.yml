name: Deploy Backend Develop to EC2 via ECR

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f "./Backend/package.json" ]; then
            cd Backend
          fi
          npm ci

      - name: Generate Prisma client
        run: |
          if [ -f "./Backend/package.json" ]; then
            cd Backend
          fi
          npx prisma generate

      - name: Run tests
        run: |
          if [ -f "./Backend/package.json" ]; then
            cd Backend
          fi
          npm test
        env:
          CI: true

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: swe-team-9/backend
          IMAGE_TAG: develop
        run: |
          if [ -f "./Backend/Dockerfile" ]; then
            BUILD_CONTEXT="./Backend"
            DOCKERFILE="./Backend/Dockerfile"
          else
            BUILD_CONTEXT="."
            DOCKERFILE="./Dockerfile"
          fi
          docker build -f $DOCKERFILE -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $BUILD_CONTEXT
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to EC2 and Verify
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e 

            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            
            cd /home/ec2-user/dev
            
            docker-compose pull
            docker-compose down --remove-orphans
            docker-compose up -d
            
            echo "Waiting 15 seconds for the application to boot and stabilize..."
            sleep 15
            
            # Print status to the GitHub Actions log for visibility
            docker-compose ps
            
           
           
            CONTAINER_ID=$(docker-compose ps -q backend)
            IS_RUNNING=$(docker inspect -f '{{.State.Running}}' $CONTAINER_ID)
            
            if [ "$IS_RUNNING" != "true" ]; then
              echo "❌ ERROR: The backend container crashed on boot! Likely an unhandled exception."
              echo "--- PRINTING CRASH LOGS FOR BACKEND TEAM ---"
              docker-compose logs backend
              exit 1 # This explicitly fails the GitHub Actions pipeline
            fi
            
            echo "✅ Backend successfully booted and is stable."
            docker image prune -a -f
