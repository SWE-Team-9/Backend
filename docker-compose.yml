services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magsw_backend
    restart: unless-stopped
    ports:
      - "3006:3006"
    env_file:
      - .env
    environment:
      PORT: "3006"
    volumes:
      - backend_uploads:/app/uploads

volumes:
  backend_uploads:
    driver: local
